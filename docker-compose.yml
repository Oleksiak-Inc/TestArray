version: "3.9"

services:
  postgres:
    image: postgres:16
    container_name: fm_postgres
    restart: always
    env_file:
      - .env.production
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d testarray"]
      interval: 10s
      timeout: 5s
      retries: 5

  migrate:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: fm_migrate
    env_file:
      - .env.production
    environment:
      POSTGRES_SERVER: postgres
      SERVER_HOST: 0.0.0.0
      SERVER_PORT: 8000
    depends_on:
      postgres:
        condition: service_healthy
    command: alembic upgrade head
    restart: "no"

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: fm_backend
    env_file:
      - .env.production
    environment:
      POSTGRES_SERVER: postgres
      SERVER_HOST: 0.0.0.0
      SERVER_PORT: 8000
    depends_on:
      migrate:
        condition: service_completed_successfully
    command: >
      uvicorn run:app
      --host 0.0.0.0
      --port 8000
    ports:
      - "8000:8000"
    volumes:
      - uploads_data:/app/uploads
    restart: on-failure

volumes:
  postgres_data:
  uploads_data:
